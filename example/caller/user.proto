syntax = "proto3";

package Kuser;

option cc_generic_services = true;      // 将service翻译为C++虚基类

message ResultCode{
    int32 errCode = 1;
    bytes errmsg = 2;
}

message LoginRequest{
    bytes name = 1;
    bytes pwd = 2;
}

message LoginResponse{
    ResultCode result = 1;      // 必须使用mutable_result访问
    bool success = 2;
}

message RegisterRequest{
    uint32 id = 1;
    bytes name = 2;
    bytes pwd = 3;
}

message RegisterResponse{
    ResultCode result = 1;      // 必须使用mutable_result访问
    bool success = 2;
}

service UserServiceRpc{
    rpc Login(LoginRequest) returns(LoginResponse);
    rpc Register(RegisterRequest) returns(RegisterResponse);
}
